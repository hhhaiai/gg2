services:
  grok2api:
    container_name: grok2api
    build:                                    # 改为本地构建
      context: .
      dockerfile: Dockerfile
      # image: ghcr.io/jiujiu532/grok2api:latest  # 注释掉远程镜像
    ports:
      - "${HOST_PORT:-8000}:${SERVER_PORT:-8000}"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8000}
      SERVER_WORKERS: ${SERVER_WORKERS:-1}
      ACCOUNT_STORAGE: ${ACCOUNT_STORAGE:-local}
      ACCOUNT_LOCAL_PATH: ${ACCOUNT_LOCAL_PATH:-data/accounts.db}
      ACCOUNT_REDIS_URL: ${ACCOUNT_REDIS_URL:-}
      ACCOUNT_MYSQL_URL: ${ACCOUNT_MYSQL_URL:-}
      ACCOUNT_POSTGRESQL_URL: ${ACCOUNT_POSTGRESQL_URL:-}
      # 启用 CF 自动刷新: 取消以下三行注释，并取消底部 flaresolverr 服务的注释
      # FLARESOLVERR_URL: http://flaresolverr:8191
      # CF_REFRESH_INTERVAL: "600"
      # CF_TIMEOUT: "60"

      # ACCOUNT_STORAGE: local | redis | mysql | postgresql
      # ACCOUNT_LOCAL_PATH: SQLite path when ACCOUNT_STORAGE=local
      # ACCOUNT_REDIS_URL: Redis DSN when ACCOUNT_STORAGE=redis
      # ACCOUNT_MYSQL_URL: MySQL DSN when ACCOUNT_STORAGE=mysql
      # ACCOUNT_POSTGRESQL_URL: PostgreSQL DSN when ACCOUNT_STORAGE=postgresql
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.toml:/app/data/config.toml  # 挂载自定义配置（覆盖运行时配置）
    restart: unless-stopped
    # 资源限制：适配 2c2g 服务器 + 10 万账号（random 模式）
    deploy:
      resources:
        limits:
          cpus: '1.5'           # 2C 留 0.5C 给系统
          memory: 1.5G          # 2G 留 0.5G 给系统（random 模式仅需 400-500MB）
        reservations:
          cpus: '0.5'
          memory: 512M
    # 健康检查
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${SERVER_PORT:-8000}/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Side-car 探针进程:独立容器跑 `python -m app.probe`,持续向 grok.com 发
  # max_tokens=1 的真实聊天请求,记录每个账号的 last_latency_ms / last_probe_at
  # 到共享的 SQLite DB。API 进程(grok2api)以 60s 周期把这些结果同步到内存表,
  # 当 account.selection.strategy="fast" 时驱动低延迟账号优先选号。
  # 资源占用被故意压低 (cpus=0.5, memory=512M),适合 2c2g 服务器。
  grok2api-probe:
    container_name: grok2api-probe
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.probe"]
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE_ENABLED: "true"
      ACCOUNT_STORAGE: ${ACCOUNT_STORAGE:-local}
      ACCOUNT_LOCAL_PATH: ${ACCOUNT_LOCAL_PATH:-data/accounts.db}
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # 如果出口 IP 不干净，可取消以下注释使用 Warp 作为落地代理
  # 启用后将 proxy.base_proxy_url 设为 socks5://warp:1080
  # warp:
  #   container_name: warp
  #   image: caomingjun/warp:latest
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:1080:1080"
  #   environment:
  #     - WARP_SLEEP=2
  #   cap_add:
  #     - NET_ADMIN

  # 启用 CF 自动刷新时取消以下注释
  # flaresolverr:
  #   container_name: flaresolverr
  #   image: ghcr.io/flaresolverr/flaresolverr:latest
  #   ports:
  #     - "127.0.0.1:8191:8191"
  #   environment:
  #     TZ: Asia/Shanghai
  #     LOG_LEVEL: info
  #   restart: unless-stopped
